<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Boost Zone | Menu</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-color: #161b22;
            --accent-color: #00d4ff;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        /* Grade das Abas */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* Estilo das Abas Quadradas */
        .aba-card {
            background-color: var(--card-color);
            border-radius: 20px; /* Bordas arredondadas que você pediu */
            overflow: hidden;
            border: 1px solid #30363d;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .aba-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
        }

        /* Espaço para a Capa que você vai mandar */
        .capa-foto {
            width: 100%;
            height: 150px;
            background-color: #21262d; /* Cor provisória */
            background-size: cover;
            background-position: center;
        }

        .conteudo-card {
            padding: 20px;
            text-align: center;
        }

        .conteudo-card h2 { margin: 0; font-size: 1.5rem; }
        .conteudo-card p { color: #8b949e; font-size: 0.9rem; margin-top: 10px; }

    </style>
</head>
<body>

    <h1>Rocket League Pro Tips</h1>

    <div class="grid-container">
        
        <a href="1v1.html" class="aba-card">
            <div class="capa-foto" style="background-image: url('URL_DA_SUA_FOTO_AQUI');"></div>
            <div class="conteudo-card">
                <h2>Dicas de 1v1</h2>
                <p>Aprenda controle de bola e 50/50.</p>
            </div>
        </a>

        <a href="2v2.html" class="aba-card">
            <div class="capa-foto" style="background-image: url('URL_DA_SUA_FOTO_AQUI');"></div>
            <div class="conteudo-card">
                <h2>Dicas de 2v2</h2>
                <p>Posicionamento e rotação com parceiro.</p>
            </div>
        </a>

        <a href="treinos.html" class="aba-card">
            <div class="capa-foto" style="background-image: url('URL_DA_SUA_FOTO_AQUI');"></div>
            <div class="conteudo-card">
                <h2>Packs de Treino</h2>
                <p>Os melhores códigos para evoluir rápido.</p>
            </div>
        </a>

    </div>

</body>
</html>
